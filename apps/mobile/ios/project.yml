# XcodeGen manifest for the Fabric iOS client.
# Generate the project with:  xcodegen generate
# project.yml remains authoritative; the generic .xcodeproj bootstrap is
# committed so Xcode Cloud can discover the project before post-clone scripts.
name: FabricMobile
options:
  bundleIdPrefix: io.github.obliviousodin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Fabric:
    type: application
    platform: iOS
    sources:
      - Fabric
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile
        PRODUCT_NAME: Fabric
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Automatic signing once a team is set (Signing.xcconfig.example, or
        # DEVELOPMENT_TEAM=... on the xcodebuild command line). CI builds with
        # CODE_SIGNING_ALLOWED=NO, so this stays inert there.
        CODE_SIGN_STYLE: Automatic
    info:
      path: Fabric/Info.plist
      properties:
        CFBundleDisplayName: Fabric
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        FabricSourceRevision: development
        CFBundleURLTypes:
          - CFBundleURLName: io.github.obliviousodin.fabric.mobile.pairing
            CFBundleURLSchemes:
              - fabric
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSCameraUsageDescription: >-
          Fabric uses the camera to scan the pairing QR code shown by
          `fabric mobile`.
        NSLocalNetworkUsageDescription: >-
          Fabric connects to the Fabric gateway running on your local network
          or tailnet.
        # Declare local-network access without weakening ATS globally. Fabric
        # TestFlight connections should still use HTTPS, including IP-based
        # LAN and tailnet endpoints.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  FabricTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FabricTests
      - path: ../contracts/gateway-capabilities-v1.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-incompatible.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-malformed.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-families-v1.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-family-contradiction.json
        buildPhase: resources
      - path: ../contracts/gateway-feature-registry-v1.json
        buildPhase: resources
      - path: ../contracts/legacy-mobile-methods.json
        buildPhase: resources
      - path: ../contracts/fabric-pairing-v2.json
        buildPhase: resources
      # Canonical v1 durable Work corpus. Keep each fixture as a resource so
      # XCTest exercises the exact JSON shared with TypeScript and Kotlin.
      - path: ../contracts/fabric-work-v1/manifest.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/bootstrap-page-1.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/bootstrap-page-2.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/delta.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/tombstone.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/terminal.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/sensitive-attention.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/malformed.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/incompatible.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/additive-future.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/replaced-ledger.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/cursor-expired.json
        buildPhase: resources
    dependencies:
      - target: Fabric
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile.tests
schemes:
  Fabric:
    build:
      targets:
        Fabric: all
        FabricTests: [test]
    test:
      targets:
        - FabricTests
