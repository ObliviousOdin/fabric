name: Publish documentation

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "skills/**"
      - "optional-skills/**"
      - "fabric_cli/model_catalog.json"
      - "fabric_cli/commands.py"
      - "fabric_cli/_parser.py"
      - "fabric_cli/kanban.py"
      - "fabric_cli/kanban_db.py"
      - "fabric_cli/main.py"
      - "fabric_cli/models.py"
      - "fabric_cli/providers.py"
      - "fabric_cli/subcommands/**"
      - "gateway/config.py"
      - "plugins/**/dashboard/manifest.json"
      - "plugins/kanban/**"
      - "plugins/model-providers/**"
      - "plugins/platforms/**"
      - "providers/**"
      - "scripts/build_capability_evidence.py"
      - "scripts/docs_sync.py"
      - "toolsets.py"
      - "web/src/app/routes.tsx"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Audit public release boundary
        run: python3 scripts/public-release-audit.py
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Install skills-index dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml==6.0.3
      - name: Check generated documentation contracts
        run: python3 scripts/docs_sync.py check
      - name: Check generated skill documentation
        run: python3 website/scripts/generate-skill-docs.py --check
      - name: Audit documented tokens and skill metadata
        run: python3 scripts/docs_sync.py audit
      - name: Test documentation contracts
        run: python3 -m unittest tests.scripts.test_docs_sync
      - name: Install documentation dependencies
        run: npm ci --prefix website
      - name: Audit public site source identity
        run: python3 scripts/fabric-brand-audit.py --mode public
      - name: Build documentation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run --prefix website build
      - name: Audit rendered public site identity
        run: python3 scripts/fabric-brand-audit.py --mode public --build-dir website/build
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
