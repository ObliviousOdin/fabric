name: nemo_relay
version: "0.1.0"
description: "Optional NeMo Relay observability for Fabric. Opt in with `fabric plugins enable observability/nemo_relay`; configure exports under observability.nemo_relay in config.yaml."
author: NousResearch
hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - subagent_start
  - subagent_stop
