# Fabric — packaged compatibility copy of the built-in brand skin.
#
# The runtime's canonical brand is the built-in `default`/`fabric` skin in
# fabric_cli/skin_engine.py. Installers still copy this YAML for older managed
# runtimes, so it intentionally mirrors that built-in definition.
#
# What it drives:
#   - the CLI banner ASCII logo + hero art + panel colors (banner.py reads
#     banner_logo / banner_hero / banner_* colors from the active skin)
#   - the interactive prompt, welcome/goodbye, response-box label, /help header
#   - the compact banner + suspend line agent name, and the Ink TUI brand
#     (the gateway forwards the skin's `branding` map to the TUI, whose
#     fromSkin() applies agent_name etc.)
#
# Both `display.skin: default` and `display.skin: fabric` resolve to this Fabric
# identity. Other named skins may still change the visual theme explicitly.
name: fabric
description: Fabric default theme

branding:
  agent_name: "Fabric"
  welcome: "Fabric. Type a message or /help for commands."
  goodbye: "Fabric session closed."
  response_label: " Fabric "
  prompt_symbol: "❯"
  help_header: "Fabric commands"

# Fabric design-system tokens. Terminal art approximates the new gradient with
# sanctioned primary and accent steps.
colors:
  banner_border: "#4628CC"
  banner_title: "#9481E6"
  banner_accent: "#7C66E1"
  banner_dim: "#667085"
  banner_text: "#F0EDFB"
  ui_accent: "#7C66E1"
  ui_label: "#9481E6"
  ui_ok: "#0F9545"
  ui_error: "#EA2A37"
  ui_warn: "#E09818"
  prompt: "#F0EDFB"
  input_rule: "#4628CC"
  response_border: "#4628CC"
  status_bar_bg: "#19294D"
  status_bar_text: "#F5F5F5"
  status_bar_strong: "#9481E6"
  status_bar_dim: "#667085"
  status_bar_good: "#0F9545"
  status_bar_warn: "#E09818"
  status_bar_bad: "#EA2A37"
  status_bar_critical: "#B2202A"
  session_label: "#9481E6"
  session_border: "#667085"

# Terminal wordmark for the public Fabric identity.
banner_logo: |
  [bold #9481E6]  ╭─────────╮[/]
  [bold #7C66E1]  │╱───────╯ •[/]
  [bold #9481E6]  ├────╮  fabric[/]
  [bold #7C66E1]  │╱──╯[/]
  [bold #9481E6]  │[/]
  [dim #667085]  ╰──────────────╮[/]

# Compact Fabric monogram for the information panel.
banner_hero: |
  [bold #9481E6]  ╭──────╮[/]
  [bold #7C66E1]  │╱────╯•[/]
  [bold #9481E6]  ├──╮[/]
  [bold #7C66E1]  │╱╯[/]
  [bold #9481E6]  │[/]
  [dim #667085]  ╰────╮[/]
