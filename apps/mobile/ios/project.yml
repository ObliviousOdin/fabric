# XcodeGen manifest for the Fabric iOS client.
# Generate the project with:  xcodegen generate
# project.yml remains authoritative; the generic .xcodeproj bootstrap is
# committed so Xcode Cloud can discover the project before post-clone scripts.
name: FabricMobile
options:
  bundleIdPrefix: io.github.obliviousodin
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.2.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Fabric:
    type: application
    platform: iOS
    sources:
      - Fabric
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile
        PRODUCT_NAME: Fabric
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Automatic signing once a team is set (Signing.xcconfig.example, or
        # DEVELOPMENT_TEAM=... on the xcodebuild command line). CI builds with
        # CODE_SIGNING_ALLOWED=NO, so this stays inert there.
        CODE_SIGN_STYLE: Automatic
    info:
      path: Fabric/Info.plist
      properties:
        CFBundleDisplayName: Fabric
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        FabricSourceRevision: development
        CFBundleURLTypes:
          - CFBundleURLName: io.github.obliviousodin.fabric.mobile.pairing
            CFBundleURLSchemes:
              - fabric
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSCameraUsageDescription: >-
          Fabric uses the camera to scan the pairing QR code shown by
          `fabric mobile`.
        NSLocalNetworkUsageDescription: >-
          Fabric connects to the Fabric gateway running on your local network
          or tailnet.
        NSMicrophoneUsageDescription: >-
          Fabric uses the microphone only when you tap Dictate to turn speech
          into a message draft.
        NSSpeechRecognitionUsageDescription: >-
          Fabric uses Apple Speech to turn the words you dictate into a message
          draft.
        # Declare local-network access without weakening ATS globally. Fabric
        # TestFlight connections should still use HTTPS, including IP-based
        # LAN and tailnet endpoints.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      # Companion watch app (WATCH.md §5, W-relay). Embedded into the iOS
      # product's Watch content; the watch holds no gateway credentials.
      - target: FabricWatch
  FabricWatch:
    type: application
    platform: watchOS
    sources:
      - FabricWatch
      # Shared relay codec — one wire contract compiled into both ends
      # (and the widget) so payload validation cannot drift.
      - path: Fabric/WatchBridge/WatchRelayContract.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile.watchkitapp
        PRODUCT_NAME: Fabric
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: FabricWatch/FabricWatch.entitlements
    entitlements:
      path: FabricWatch/FabricWatch.entitlements
      properties:
        # Shares the pet-glance snapshot with the widget extension only.
        # Device builds require this group in the signing team's account.
        com.apple.security.application-groups:
          - group.io.github.obliviousodin.fabric.mobile
    info:
      path: FabricWatch/Info.plist
      properties:
        CFBundleDisplayName: Fabric
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        FabricSourceRevision: development
        FabricAppGroupIdentifier: group.io.github.obliviousodin.fabric.mobile
        WKApplication: true
        WKCompanionAppBundleIdentifier: io.github.obliviousodin.fabric.mobile
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: >-
          Fabric records a voice note only while you hold the Record screen
          open; the audio is handed to your iPhone for transcription.
    dependencies:
      - target: FabricWatchWidgets
  FabricWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - FabricWatchWidgets
      - path: Fabric/WatchBridge/WatchRelayContract.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile.watchkitapp.widgets
        PRODUCT_NAME: FabricWatchWidgets
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: FabricWatchWidgets/FabricWatchWidgets.entitlements
    entitlements:
      path: FabricWatchWidgets/FabricWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.github.obliviousodin.fabric.mobile
    info:
      path: FabricWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Fabric Pet
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        FabricAppGroupIdentifier: group.io.github.obliviousodin.fabric.mobile
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  FabricTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FabricTests
      - path: ../contracts/gateway-capabilities-v1.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-incompatible.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-malformed.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-families-v1.json
        buildPhase: resources
      - path: ../contracts/gateway-capabilities-family-contradiction.json
        buildPhase: resources
      - path: ../contracts/gateway-feature-registry-v1.json
        buildPhase: resources
      - path: ../contracts/legacy-mobile-methods.json
        buildPhase: resources
      - path: ../contracts/fabric-pairing-v2.json
        buildPhase: resources
      # Canonical v1 durable Work corpus. Keep each fixture as a resource so
      # XCTest exercises the exact JSON shared with TypeScript and Kotlin.
      - path: ../contracts/fabric-work-v1/manifest.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/bootstrap-page-1.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/bootstrap-page-2.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/delta.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/tombstone.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/terminal.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/sensitive-attention.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/malformed.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/incompatible.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/additive-future.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/replaced-ledger.json
        buildPhase: resources
      - path: ../contracts/fabric-work-v1/cursor-expired.json
        buildPhase: resources
      # Shared voice v1 corpus. Phone audio remains a client-owned contract;
      # these fixtures do not advertise gateway-host microphone methods.
      - path: ../contracts/fabric-voice-v1/voice-manifest.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/transcription-completed.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/transcription-failed.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/transcription-additive-future.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/transcription-incompatible.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/transcription-malformed.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/phone-audio-voice-note.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/phone-audio-chat.json
        buildPhase: resources
      - path: ../contracts/fabric-voice-v1/phone-audio-malformed.json
        buildPhase: resources
    dependencies:
      - target: Fabric
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile.tests
  FabricUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FabricUITests
    dependencies:
      - target: Fabric
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.github.obliviousodin.fabric.mobile.uitests
schemes:
  Fabric:
    build:
      targets:
        Fabric: all
        FabricTests: [test]
    test:
      targets:
        - FabricTests
        - FabricUITests
  FabricWatch:
    build:
      targets:
        FabricWatch: all
