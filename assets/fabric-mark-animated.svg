      <path d="M 83.02 46.64 C 83.02 49.34 80.83 51.53 78.12 51.53 C 75.42 51.53 73.23 49.34 73.23 46.64 C 73.23 43.94 75.42 41.75 78.12 41.75 C 80.83 41.75 83.02 43.94 83.02 46.64 Z" />
    </clipPath>
  </defs>

  <g class="fma-symbol">
    <g clip-path="url(#fma-clip)">
      <path fill="url(#fma-gradient)"
        d="M 108 18 H 57.97 C 50.05 20.47 42.12 24.91 35.68 31 C 30.5 35.9 25.8 43.1 21.49 53.55 C 21.35 53.15 21.5 52.35 21.82 51.41 C 23.63 41.7 29.91 30.84 39.48 22.94 V 18.33 H 20 V 110 H 39.32 V 87.95 C 32.88 89.76 26.11 93.71 21.82 97.33 C 21.58 97.2 21.56 97 21.65 96.83 C 30.73 84.65 44.93 77.41 61.28 77.41 H 69.53 L 82.41 57.66 H 53.85 C 38.66 65.73 27.43 77.25 21.65 90.91 C 21.4 90.75 21.4 90.5 21.49 90.25 C 23.63 79.22 29.58 69.51 39.48 61.12 V 52.23 C 32.71 53.88 26.27 56.84 21.49 60.63 C 21.25 60.5 21.2 60.2 21.32 59.97 C 26.44 53.38 32.05 50.59 34.86 49.11 L 103.71 21.62 C 103.87 22.11 101.07 24.75 95.29 29.03 C 88.35 32.65 84 34.4 80.92 35.45 C 85.05 38.41 88.52 42.69 89.51 46.64 L 108 18.49 Z" />
      <path class="fma-eye" fill="url(#fma-gradient)"
        d="M 83.02 46.64 C 83.02 49.34 80.83 51.53 78.12 51.53 C 75.42 51.53 73.23 49.34 73.23 46.64 C 73.23 43.94 75.42 41.75 78.12 41.75 C 80.83 41.75 83.02 43.94 83.02 46.64 Z" />
      <rect class="fma-sheen" x="0" y="0" width="60" height="128" fill="url(#fma-sheen-gradient)" />
    </g>
    <circle class="fma-ring" cx="78.12" cy="46.64" r="7" fill="none" stroke="#9481E6" stroke-width="1.5" />
  </g>
</svg>
