<?xml version="1.0" encoding="UTF-8"?>
<!-- Animated Fabric mark. Derived from the canonical mark in
     apps/design-system/src/brand/fabric/mark.svg. Motion follows the Woven
     Operations design contract (web/DESIGN.md): the mark rises into place, a
     single shuttle of light passes across the weave, and the eye of the F
     breathes as a live signal. Opacity and transform only, restrained purple,
     prefers-reduced-motion honored. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none" role="img" aria-labelledby="fma-title fma-desc">
  <title id="fma-title">Fabric</title>
  <desc id="fma-desc">The woven Fabric mark rises into place. A shuttle of light passes across the letterform and the eye of the F breathes with a soft ring, the same signal a live agent uses.</desc>
  <style>
    :root { --fma-ease: cubic-bezier(0.22, 1, 0.36, 1); --fma-std: cubic-bezier(0.465, 0.183, 0.153, 0.946); }
    .fma-symbol { animation: fma-rise 700ms var(--fma-ease) both; }
    .fma-sheen  { animation: fma-shuttle 6s var(--fma-std) 1.2s infinite; }
    .fma-eye    { transform-box: fill-box; transform-origin: center; animation: fma-breathe 4.2s ease-in-out 1s infinite; }
    .fma-ring   { transform-box: fill-box; transform-origin: center; opacity: 0; animation: fma-ring 4.2s ease-out 1s infinite; }
    @keyframes fma-rise    { from { opacity: 0; transform: translateY(8px); } }
    @keyframes fma-shuttle { 0% { transform: translateX(-60px); } 55%, 100% { transform: translateX(128px); } }
    @keyframes fma-breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    @keyframes fma-ring    { 0% { opacity: 0.5; transform: scale(0.6); } 70%, 100% { opacity: 0; transform: scale(2.2); } }
    @media (prefers-reduced-motion: reduce) {
      .fma-symbol, .fma-eye { animation: none; }
      .fma-sheen, .fma-ring { display: none; }
    }
  </style>
  <defs>
    <linearGradient id="fma-gradient" x1="20" y1="64" x2="108" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B267D" />
      <stop offset="0.24" stop-color="#3E2B83" />
      <stop offset="0.39" stop-color="#5239B6" />
      <stop offset="0.46" stop-color="#5A47D7" />
      <stop offset="0.72" stop-color="#5A47D8" />
      <stop offset="1" stop-color="#5F5CEE" />
    </linearGradient>
    <linearGradient id="fma-sheen-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <clipPath id="fma-clip">
