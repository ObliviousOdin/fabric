name: Fabric desktop release

# Dispatched (never on `release:` — our own releases are created with
# GITHUB_TOKEN, which by design never triggers workflow runs) at `ref: <tag>` by
# the production promotion in release-channels.yml, after the Python release is
# live. Packaging + signing is decoupled from the Python release so a desktop
# failure never blocks or corrupts it, and the run is re-dispatchable. A tiny
# main-only registration job runs when this file changes so GitHub recognizes its
# manual trigger before it is needed. The unsigned matrix in
# desktop-packaging.yml stays as pre-release verification; the release build here
# is the only production-policy build.
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/desktop-release.yml
  workflow_dispatch:
    inputs:
      release_tag:
        description: Production CalVer tag to package, for example v2026.7.15
        required: true
        type: string
      force_replace:
        description: Overwrite an already-attached installer whose bytes differ
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: Repackage even if this desktop version already shipped
        required: false
        default: false
        type: boolean
      backfill_from_main:
        description: Emergency only: repair this published tag from the reviewed main workflow
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  # One run per release tag; never cancel an in-progress attach mid-upload.
  group: desktop-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  register-manual-release-workflow:
    name: Register manual desktop release workflow
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - run: echo "Registered the desktop release workflow's manual trigger."

  resolve-release:
    name: Resolve release and gate packaging
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      desktop_version: ${{ steps.resolve.outputs.desktop_version }}
      should_package: ${{ steps.resolve.outputs.should_package }}
    steps:
      # Normal releases are dispatched at ref: <tag>, so github.sha is the tag
      # commit. The sole exception is an explicitly requested backfill from the
      # protected main branch after a reviewed workflow repair; the package source
      # still comes from the immutable release tag in either case.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Resolve release and decide packaging
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          BACKFILL_FROM_MAIN: ${{ inputs.backfill_from_main }}
        run: |
          set -euo pipefail
          git fetch --force --no-tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          release_package="${RUNNER_TEMP}/release-desktop-package.json"
          git show "${RELEASE_TAG}:apps/desktop/package.json" > "$release_package"
          args=(
            python scripts/ci/desktop_release_assets.py resolve
            --repository "${{ github.repository }}"
            --tag "$RELEASE_TAG"
            --github-sha "${{ github.sha }}"
            --github-ref "${{ github.ref }}"
            --desktop-package "$release_package"
            --output "$GITHUB_OUTPUT"
          )
          if [[ "$BACKFILL_FROM_MAIN" == "true" ]]; then
            args+=(--allow-main-backfill)
          fi
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            args+=(--force-rebuild)
          fi
          "${args[@]}"

  package:
    name: Package release ${{ matrix.label }}
    needs: resolve-release
    if: needs.resolve-release.outputs.should_package == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    # The signing secrets live in this environment; access is gated by its
    # deployment tag/branch policy (v20* tags + main for backfill), never by
    # event type. Only this job declares the environment, so only a v20* dispatch
    # can reach the Developer ID cert and notarization key.
    environment:
      name: desktop-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            builder_args: --mac
            platform: mac
          - label: Windows x64
            runner: windows-2025
            builder_args: --win
            platform: win
          - label: Linux x64
            runner: ubuntu-24.04
            builder_args: --linux AppImage deb rpm
            platform: linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.source_sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # No signing env here — the Developer ID cert and notarization key must not
      # be visible to npm ci's dependency lifecycle scripts or the renderer build.
      - name: Install dependencies
        run: npm ci

      - name: Stage the verified Fabric Link native companion
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          download_dir="${RUNNER_TEMP}/fabric-link-core-release"
          mkdir -p "$download_dir"
          while IFS=$'\t' read -r asset_name asset_id; do
            test "$asset_name" = "$(basename "$asset_name")"
            [[ "$asset_id" =~ ^[0-9]+$ ]]
            gh api \
              --header "Accept: application/octet-stream" \
              "repos/${{ github.repository }}/releases/assets/${asset_id}" \
              > "${download_dir}/${asset_name}"
          done < <(
            gh api \
              --header "Accept: application/vnd.github+json" \
              "repos/${{ github.repository }}/releases/tags/${{ inputs.release_tag }}" \
              --jq '.assets[]
                | select(
                    .name == "release-manifest.json"
                    or (
                      (.name | startswith("fabric_link_core-"))
                      and (.name | endswith(".whl"))
                    )
                  )
                | [.name, (.id | tostring)]
                | @tsv'
          )
          test -s "${download_dir}/release-manifest.json"
          python scripts/ci/stage_link_core_wheel.py \
            --release-dir "$download_dir" \
            --destination apps/desktop/resources/link-core \
            --platform "${{ matrix.platform }}" \
            --repository "${{ github.repository }}" \
            --source-sha "${{ needs.resolve-release.outputs.source_sha }}" \
            --version "${{ needs.resolve-release.outputs.desktop_version }}"

      # §3.2: build the renderer and main bundle FIRST, with NO signing env. The
      # Developer ID cert / notarization key must never be visible to tsc,
      # Vite, or the bundler — only to electron-builder's sign
      # phase below. The channel stamp is a build-time concern (write-build-stamp
      # .mjs runs inside `npm run build`), so it lives here, not with the secrets.
      - name: Build renderer and main
        env:
          # Release channel stamp (§3.8) — consumed by write-build-stamp.mjs in
          # WP-B so a packaged install self-updates its backend but never runs the
          # GUI rebuild/swap path.
          FABRIC_RELEASE_CHANNEL: release
        run: npm run --prefix apps/desktop build

      # Signing secrets are scoped to THIS step only (never job-level), and only
      # electron-builder — not the renderer build above — can see them. electron-
      # builder never publishes from here (electron-builder runs with the publish
      # mode set to never). The release matrix deliberately does
      # NOT set CSC_IDENTITY_AUTO_DISCOVERY to "false" (that stays in the
      # verification workflow) so signing stays enabled.
      - name: Package release artifacts
        env:
          # macOS Developer ID + notarization (dedicated minimal-role key).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Missing/partial credentials must fail a production macOS build.
          FABRIC_REQUIRE_NOTARIZATION: ${{ runner.os == 'macOS' && 'true' || 'false' }}
        run: npm run --prefix apps/desktop builder -- ${{ matrix.builder_args }} --publish never

      - name: Notarize and staple macOS disk image
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          dmg="$(find apps/desktop/release -maxdepth 1 -name 'Fabric-*-mac-arm64.dmg' -type f | head -n1)"
          test -n "$dmg" || { echo "::error::no Fabric dmg produced" >&2; exit 1; }
          node apps/desktop/scripts/notarize-artifact.mjs "$dmg"

      - name: Assert macOS signatures and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app="$(find apps/desktop/release -maxdepth 2 -name 'Fabric.app' -type d | head -n1)"
          test -n "$app" || { echo "::error::no Fabric.app produced" >&2; exit 1; }
          codesign --verify --strict --deep --verbose=2 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          # Offline Gatekeeper needs a stapled ticket on the .app (the .zip carries
          # the stapled .app inside; never stapler-validate a zip).
          stapler validate "$app"
          # Hardened-runtime notarization requires every nested Mach-O to be signed,
          # including node-pty's extensionless app.asar.unpacked spawn-helper.
          spawn_helper="$(find "$app/Contents" -type f -name spawn-helper | head -n1)"
          test -n "$spawn_helper" || { echo "::error::spawn-helper is missing" >&2; exit 1; }
          file "$spawn_helper" | grep -q 'Mach-O'
          while IFS= read -r -d '' candidate; do
            if file "$candidate" | grep -q 'Mach-O'; then
              codesign --verify --strict --verbose=2 "$candidate"
            fi
          done < <(find "$app/Contents" -type f -print0)
          # The dmg is notarized and stapled in the dedicated post-build pass.
          for dmg in apps/desktop/release/Fabric-*-mac-arm64.dmg; do
            codesign --verify --strict --verbose=2 "$dmg"
            stapler validate "$dmg"
          done

      - name: Assert Windows Authenticode signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:ALLOW_UNSIGNED_WINDOWS -eq 'true') {
            Write-Host 'ALLOW_UNSIGNED_WINDOWS=true: skipping Authenticode assertion (SmartScreen documented in RELEASING.md).'
            exit 0
          }
          $targets = Get-ChildItem -Path apps/desktop/release -Recurse -Include Fabric.exe,*.exe,*.msi
          if (-not $targets) { Write-Error 'no Windows installers produced'; exit 1 }
          foreach ($file in $targets) {
            $sig = Get-AuthenticodeSignature $file.FullName
            if ($sig.Status -ne 'Valid') { Write-Error "unsigned: $($file.Name) ($($sig.Status))"; exit 1 }
            if (-not $sig.TimeStamperCertificate) { Write-Error "no RFC3161 timestamp: $($file.Name)"; exit 1 }
          }
        env:
          ALLOW_UNSIGNED_WINDOWS: ${{ vars.ALLOW_UNSIGNED_WINDOWS }}

      - name: Collect and checksum installers
        shell: bash
        run: >-
          python scripts/ci/desktop_release_assets.py collect
          --release-dir apps/desktop/release
          --out-dir apps/desktop/release-assets
          --platform ${{ matrix.platform }}
          --repository "${{ github.repository }}"
          --tag "${{ inputs.release_tag }}"
          --source-sha "${{ needs.resolve-release.outputs.source_sha }}"
          --desktop-version "${{ needs.resolve-release.outputs.desktop_version }}"

      - name: Upload release installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-release-${{ matrix.platform }}
          path: apps/desktop/release-assets/*
          if-no-files-found: error
          retention-days: 14

  attach-assets:
    name: Verify and attach desktop installers
    needs: [resolve-release, package]
    if: needs.resolve-release.outputs.should_package == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # github.token is sufficient to attach assets; no environment (and thus no
    # signing secrets) is needed on the write job.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.source_sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Download all release installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: desktop-release-*
          path: staging
          merge-multiple: true

      # Re-hash every downloaded installer against its per-platform manifest and
      # merge them into one manifest + combined SHA256SUMS BEFORE anything touches
      # the release.
      - name: Verify installers before attaching
        run: >-
          python scripts/ci/desktop_release_assets.py verify
          --staging-dir staging
          --out-dir release-assets
          --repository "${{ github.repository }}"
          --tag "${{ inputs.release_tag }}"
          --source-sha "${{ needs.resolve-release.outputs.source_sha }}"
          --desktop-version "${{ needs.resolve-release.outputs.desktop_version }}"

      # Immutable attach: identical assets are skipped, a digest mismatch fails
      # loudly unless force_replace, and the manifest uploads last so a partial run
      # is never advertised as complete. All GitHub Release manipulation lives in
      # the audited Python script, never inline in YAML.
      - name: Attach installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_REPLACE: ${{ inputs.force_replace && 'yes' || '' }}
        run: >-
          python scripts/ci/desktop_release_assets.py attach
          --assets-dir release-assets
          --repository "${{ github.repository }}"
          --tag "${{ inputs.release_tag }}"
          ${FORCE_REPLACE:+--force-replace}
