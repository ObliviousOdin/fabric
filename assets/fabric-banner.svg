<?xml version="1.0" encoding="UTF-8"?>
<!-- Fabric brand banner. Derived from the canonical wordmark in
     apps/design-system/src/brand/fabric/. Colors, motifs, and motion follow
     the Woven Operations design contract (web/DESIGN.md): one active thread,
     restrained purple, sentence case, prefers-reduced-motion honored. -->
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" fill="none" role="img" aria-labelledby="fbb-title fbb-desc">
  <title id="fbb-title">Fabric</title>
  <desc id="fbb-desc">The Fabric wordmark rises onto a dark woven canvas. A single active thread weaves through the letters with a pulse of light running along it, and the bracket underline draws itself beneath the name. Tagline: built for the operators who move the physical world.</desc>
  <style>
    :root { --fbb-ease: cubic-bezier(0.22, 1, 0.36, 1); }
    .fbb-symbol  { animation: fbb-rise 700ms var(--fbb-ease) both; }
    .fbb-l1 { animation: fbb-rise 550ms var(--fbb-ease) 150ms both; }
    .fbb-l2 { animation: fbb-rise 550ms var(--fbb-ease) 220ms both; }
    .fbb-l3 { animation: fbb-rise 550ms var(--fbb-ease) 290ms both; }
    .fbb-l4 { animation: fbb-rise 550ms var(--fbb-ease) 360ms both; }
    .fbb-l5 { animation: fbb-rise 550ms var(--fbb-ease) 430ms both; }
    .fbb-bracket { stroke-dasharray: 630; animation: fbb-draw 900ms var(--fbb-ease) 600ms both; }
    .fbb-threads { animation: fbb-fade 900ms var(--fbb-ease) 200ms both; }
    .fbb-run     { stroke-dasharray: 26 14; animation: fbb-run 9s linear infinite; }
    .fbb-comet   { stroke-dasharray: 20 1180; animation: fbb-comet 7s linear 1.4s infinite; opacity: 0; }
    .fbb-dot     { animation: fbb-breathe 4.2s ease-in-out 1.8s infinite; }
    .fbb-tagline { animation: fbb-rise 600ms var(--fbb-ease) 1000ms both; }
    @keyframes fbb-rise    { from { opacity: 0; transform: translateY(10px); } }
    @keyframes fbb-fade    { from { opacity: 0; } }
    @keyframes fbb-draw    { from { stroke-dashoffset: 630; } }
    @keyframes fbb-run     { to   { stroke-dashoffset: -160; } }
    @keyframes fbb-comet   { 0% { stroke-dashoffset: 0; opacity: 0; } 4% { opacity: 0.9; } 96% { opacity: 0.9; } 100% { stroke-dashoffset: -1200; opacity: 0; } }
    @keyframes fbb-breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    @media (prefers-reduced-motion: reduce) {
      .fbb-symbol, .fbb-l1, .fbb-l2, .fbb-l3, .fbb-l4, .fbb-l5,
      .fbb-bracket, .fbb-threads, .fbb-run, .fbb-dot, .fbb-tagline { animation: none; }
      .fbb-comet { display: none; }
    }
  </style>
  <defs>
    <linearGradient id="fbb-mark-gradient" x1="20" y1="64" x2="108" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C66E1" />
      <stop offset="0.42" stop-color="#8D7AEE" />
      <stop offset="1" stop-color="#AAA0FF" />
    </linearGradient>
    <linearGradient id="fbb-thread-gradient" x1="0" y1="150" x2="880" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4628CC" />
      <stop offset="0.5" stop-color="#9481E6" />
      <stop offset="1" stop-color="#4628CC" />
    </linearGradient>
    <radialGradient id="fbb-field-falloff" cx="0.5" cy="0.42" r="0.72">
      <stop offset="0" stop-color="#000000" />
      <stop offset="0.55" stop-color="#000000" />
      <stop offset="1" stop-color="#ffffff" />
    </radialGradient>
    <pattern id="fbb-weave" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 0 43.5 H 44 M 43.5 0 V 44" stroke="#9481E6" stroke-opacity="0.09" stroke-width="1" />
    </pattern>
    <mask id="fbb-field-mask">
      <rect x="0" y="0" width="880" height="300" fill="url(#fbb-field-falloff)" />
    </mask>
    <clipPath id="fbb-tile">
      <rect x="0" y="0" width="880" height="300" rx="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#fbb-tile)">
    <rect x="0" y="0" width="880" height="300" fill="#0E0C11" />
    <!-- Woven field, quiet behind the wordmark, denser toward the selvage. -->
    <rect x="0" y="0" width="880" height="300" fill="url(#fbb-weave)" mask="url(#fbb-field-mask)" />
    <g class="fbb-threads">
      <!-- Resting threads of the weave. -->
      <path d="M -20 84 C 60 84 100 76 180 76 S 340 92 420 92 S 580 76 660 76 S 820 92 900 92"
        stroke="#9481E6" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round" />
      <path d="M -20 226 C 60 226 100 234 180 234 S 340 218 420 218 S 580 234 660 234 S 820 218 900 218"
        stroke="#9481E6" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round" />
      <!-- The active thread: the one live lineage weaving through the name. -->
      <path class="fbb-run"
        d="M -20 150 C 40 150 70 136 130 136 S 220 164 280 164 S 370 136 430 136 S 520 164 580 164 S 670 136 730 136 S 820 164 900 164"
        stroke="url(#fbb-thread-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.45" />
      <!-- A pulse of work traveling the active thread. -->
      <path class="fbb-comet"
        d="M -20 150 C 40 150 70 136 130 136 S 220 164 280 164 S 370 136 430 136 S 520 164 580 164 S 670 136 730 136 S 820 164 900 164"
        stroke="#AAA0FF" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>
  <rect x="0.5" y="0.5" width="879" height="299" rx="23.5" stroke="#28252A" />

  <!-- Canonical Fabric wordmark (dark-surface variant), centered. -->
  <g transform="translate(210 40) scale(0.72)">
    <g class="fbb-symbol">
      <g transform="scale(1.55)" fill="url(#fbb-mark-gradient)">
        <path d="M 108 18 H 57.97 C 50.05 20.47 42.12 24.91 35.68 31 C 30.5 35.9 25.8 43.1 21.49 53.55 C 21.35 53.15 21.5 52.35 21.82 51.41 C 23.63 41.7 29.91 30.84 39.48 22.94 V 18.33 H 20 V 110 H 39.32 V 87.95 C 32.88 89.76 26.11 93.71 21.82 97.33 C 21.58 97.2 21.56 97 21.65 96.83 C 30.73 84.65 44.93 77.41 61.28 77.41 H 69.53 L 82.41 57.66 H 53.85 C 38.66 65.73 27.43 77.25 21.65 90.91 C 21.4 90.75 21.4 90.5 21.49 90.25 C 23.63 79.22 29.58 69.51 39.48 61.12 V 52.23 C 32.71 53.88 26.27 56.84 21.49 60.63 C 21.25 60.5 21.2 60.2 21.32 59.97 C 26.44 53.38 32.05 50.59 34.86 49.11 L 103.71 21.62 C 103.87 22.11 101.07 24.75 95.29 29.03 C 88.35 32.65 84 34.4 80.92 35.45 C 85.05 38.41 88.52 42.69 89.51 46.64 L 108 18.49 Z" />
        <path class="fbb-dot" d="M 83.02 46.64 C 83.02 49.34 80.83 51.53 78.12 51.53 C 75.42 51.53 73.23 49.34 73.23 46.64 C 73.23 43.94 75.42 41.75 78.12 41.75 C 80.83 41.75 83.02 43.94 83.02 46.64 Z" />
      </g>
    </g>
    <g transform="translate(90 0) scale(0.87 1)" fill="#F5F5F5">
      <path class="fbb-l1" fill-rule="evenodd" d="M 150 64 C 114 64 91 87 91 122 C 91 157 113 180 148 180 C 165 180 179 174 189 163 V 177 H 217 V 67 H 189 V 80 C 179 69 166 64 150 64 Z M 153 89 C 174 89 188 102 188 122 C 188 143 174 156 153 156 C 133 156 120 143 120 122 C 120 102 133 89 153 89 Z" />
      <path class="fbb-l2" fill-rule="evenodd" d="M 230 18 H 259 V 79 C 269 69 283 64 300 64 C 334 64 356 87 356 122 C 356 157 334 180 300 180 C 282 180 268 174 258 162 V 177 H 230 Z M 299 89 C 320 89 327 102 327 122 C 327 143 319 156 299 156 C 279 156 259 143 259 122 C 259 102 279 89 299 89 Z" />
      <path class="fbb-l3" d="M 369 67 H 397 V 85 C 405 71 418 64 436 64 H 445 V 92 H 433 C 409 92 398 105 398 131 V 177 H 369 Z" />
      <path class="fbb-l4" d="M 459 67 H 488 V 177 H 459 Z M 473.5 18 C 484 18 491 25 491 35.5 C 491 46 484 53 473.5 53 C 463 53 456 46 456 35.5 C 456 25 463 18 473.5 18 Z" />
      <path class="fbb-l5" d="M 618 106 C 613 79 593 64 563 64 C 527 64 504 87 504 122 C 504 157 527 180 563 180 C 593 180 613 163 619 135 H 590 C 586 149 577 156 563 156 C 544 156 533 143 533 122 C 533 101 544 88 563 88 C 577 88 586 95 589 106 Z" />
    </g>
    <path class="fbb-bracket" d="M 31 189 V 205 H 629 V 189" stroke="#A9AEB8" stroke-width="3" />
  </g>

  <text class="fbb-tagline" x="232" y="252" fill="#ADA9B1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="500">Built for the operators who move the physical world.</text>
</svg>
