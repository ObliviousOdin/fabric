name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Fabric — traces conversations, LLM calls, and tool usage. Opt-in via `fabric plugins enable observability/langfuse` or `fabric tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - LANGFUSE_PUBLIC_KEY
  - LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_tool_call
  - post_tool_call
